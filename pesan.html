<!DOCTYPE html>
<html>
<head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
    font-size: 24px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #e0e0e0;
    font-size: 14px;
    transition: all 0.3s ease;
    font-family: Arial, sans-serif;
}

input:focus {
    outline: none;
    border: 2px solid #667eea;
    box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
    background: #f8f9ff;
}

input[readonly] {
    background: #f5f5f5;
    color: #666;
    cursor: not-allowed;
}

input[readonly]:focus {
    border: 2px solid #e0e0e0;
    box-shadow: none;
}

input::placeholder {
    color: #999;
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s ease;
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

button:active {
    transform: translateY(0);
}

/* Info section */
.info-section {
    background: #f0f4ff;
    border-left: 4px solid #667eea;
    padding: 12px;
    border-radius: 4px;
    margin-top: 25px;
    font-size: 12px;
    color: #555;
}

.info-section strong {
    color: #667eea;
}
</style>
</head>
<body>

<div class="card">
    <h2>🎫 Pesan Tiket</h2>

    <div class="form-group">
        <label>Nama Lengkap</label>
        <input id="nama" placeholder="Masukkan nama lengkap Anda">
    </div>

    <div class="form-group">
        <label>NIK (16 Digit)</label>
        <input id="nik" placeholder="Masukkan NIK 16 digit">
    </div>

    <!-- AUTO DARI DASHBOARD -->
    <div class="form-group">
        <label>Asal Perjalanan</label>
        <input id="asal" readonly>
    </div>

    <div class="form-group">
        <label>Tujuan Perjalanan</label>
        <input id="tujuan" readonly>
    </div>

    <div class="form-group">
        <label>Tanggal Keberangkatan</label>
        <input type="date" id="tanggal" readonly>
    </div>

    <button onclick="pesan()">✓ Lanjut ke Pembayaran</button>

    <div class="info-section">
        <strong>ℹ️ Info:</strong> Data asal, tujuan, dan tanggal sudah terisi otomatis dari pilihan Anda sebelumnya.
    </div>
</div>

<script>
// ambil data dari dashboard
let data = JSON.parse(localStorage.getItem("tempTiket"));

if(data){
    document.getElementById("asal").value = data.asal;
    document.getElementById("tujuan").value = data.tujuan;
    document.getElementById("tanggal").value = data.tanggal;
} else {
    alert("Data tiket tidak ditemukan!");
    window.location = "index.html";
}

function pesan(){

    let nama = document.getElementById("nama").value.trim();
    let nik = document.getElementById("nik").value.trim();

    if(!nama || !nik){
        alert("❌ Nama dan NIK wajib diisi!");
        return;
    }

    if(nik.length != 16){
        alert("❌ NIK harus 16 digit!");
        return;
    }

    if(!/^\d+$/.test(nik)){
        alert("❌ NIK hanya boleh berisi angka!");
        return;
    }

    // gabung data lama + baru
    let tiket = {
        ...data,
        nama: nama,
        nik: nik,
        jumlah: 1,
        status: "Booked"
    };

    localStorage.setItem("tiket", JSON.stringify(tiket));

    window.location = "pembayaran.html";
}
</script>

</body>
</html>

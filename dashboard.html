<!DOCTYPE html>
<html>
<head>
<title>GO-TRANS PRO - Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding-bottom: 40px;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(90deg, #1e90ff 0%, #00c6ff 100%);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
}

.navbar-subtitle {
    font-size: 12px;
    opacity: 0.9;
    margin-top: 5px;
    font-weight: normal;
    letter-spacing: 0.5px;
}

/* TRANSPORT SELECTOR */
.transport-section {
    padding: 40px 20px;
    text-align: center;
}

.transport-title {
    color: white;
    font-size: 24px;
    margin-bottom: 25px;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.transport {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 20px;
    max-width: 600px;
    margin: 0 auto;
    justify-content: center;
}

.item {
    background: white;
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}

.item::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(30, 144, 255, 0.1);
    transition: left 0.3s ease;
}

.item:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

.item:hover::before {
    left: 100%;
}

.item.active {
    border: 3px solid #1e90ff;
    background: linear-gradient(135deg, #e3f2fd 0%, #f0f8ff 100%);
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(30, 144, 255, 0.3);
}

.item-icon {
    font-size: 48px;
    margin-bottom: 10px;
}

.item-name {
    font-weight: 600;
    color: #333;
    font-size: 14px;
}

.item.active .item-name {
    color: #1e90ff;
}

/* SEARCH BOX */
.search-box {
    background: white;
    margin: 30px auto;
    padding: 40px;
    max-width: 600px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    animation: slideUp 0.6s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.search-box h2 {
    text-align: center;
    color: #333;
    margin-bottom: 10px;
    font-size: 24px;
}

.search-box .subtitle {
    text-align: center;
    color: #1e90ff;
    font-weight: 600;
    margin-bottom: 30px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input, select {
    width: 100%;
    padding: 13px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Segoe UI', Arial, sans-serif;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: none;
    border: 2px solid #1e90ff;
    box-shadow: 0 0 15px rgba(30, 144, 255, 0.2);
    background: #f8f9ff;
}

input::placeholder {
    color: #bbb;
}

.info-box {
    background: #f0f8ff;
    border-left: 4px solid #1e90ff;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12px;
    color: #1e90ff;
    margin-top: 6px;
    min-height: 18px;
    transition: all 0.3s ease;
}

.info-box.error {
    background: #ffebee;
    border-left-color: #f44336;
    color: #f44336;
}

.info-box.success {
    background: #e8f5e9;
    border-left-color: #4caf50;
    color: #4caf50;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.btn-cari {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1e90ff 0%, #00c6ff 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 10px 25px rgba(30, 144, 255, 0.3);
    margin-top: 10px;
}

.btn-cari:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(30, 144, 255, 0.4);
}

.btn-cari:active {
    transform: translateY(-1px);
}

/* HASIL SECTION */
#hasil {
    max-width: 800px;
    margin: 30px auto;
    padding: 0 20px;
}

.hasil-title {
    color: white;
    text-align: center;
    font-size: 20px;
    margin-bottom: 25px;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.card {
    background: white;
    margin-bottom: 20px;
    padding: 25px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    border-left: 5px solid #1e90ff;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.card-left {
    flex: 1;
}

.card-title {
    font-size: 18px;
    font-weight: bold;
    color: #333;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.card-icon {
    font-size: 24px;
}

.card-info {
    color: #666;
    font-size: 13px;
    margin: 5px 0;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-right {
    text-align: right;
    margin-left: 20px;
    min-width: 180px;
}

.card-price {
    font-size: 24px;
    font-weight: bold;
    color: #1e90ff;
    margin-bottom: 12px;
}

.btn-pesan {
    background: linear-gradient(135deg, #1e90ff 0%, #00c6ff 100%);
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 100%;
}

.btn-pesan:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(30, 144, 255, 0.3);
}

.btn-pesan:active {
    transform: scale(0.98);
}

/* EMPTY STATE */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: white;
}

.empty-state-icon {
    font-size: 64px;
    margin-bottom: 20px;
    opacity: 0.8;
}

.empty-state-text {
    font-size: 16px;
    opacity: 0.9;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .search-box {
        margin: 30px 20px;
        padding: 30px 20px;
    }

    .card {
        flex-direction: column;
        text-align: center;
        align-items: flex-start;
    }

    .card-right {
        margin-left: 0;
        margin-top: 15px;
        text-align: left;
        width: 100%;
    }

    .form-row {
        grid-template-columns: 1fr;
    }

    .transport {
        grid-template-columns: repeat(2, 1fr);
    }

    .transport-title {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    🚀 GO-TRANS PRO
    <div class="navbar-subtitle">✨ Booking Tiket Mudah & Cepat</div>
</div>

<!-- TRANSPORT SELECTOR -->
<div class="transport-section">
    <div class="transport-title">Pilih Jenis Transportasi</div>
    <div class="transport">
        <div class="item" onclick="pilihTransport(this, 'Pesawat')">
            <div class="item-icon">✈️</div>
            <div class="item-name">Pesawat</div>
        </div>
        <div class="item" onclick="pilihTransport(this, 'Kereta')">
            <div class="item-icon">🚆</div>
            <div class="item-name">Kereta</div>
        </div>
        <div class="item" onclick="pilihTransport(this, 'Bus')">
            <div class="item-icon">🚌</div>
            <div class="item-name">Bus</div>
        </div>
        <div class="item" onclick="pilihTransport(this, 'Kapal')">
            <div class="item-icon">⛴️</div>
            <div class="item-name">Kapal</div>
        </div>
    </div>
</div>

<!-- SEARCH BOX -->
<div class="search-box">
    <h2>🔍 Cari Tiket</h2>
    <div class="subtitle" id="jenis">Pilih transportasi terlebih dahulu</div>

    <div class="form-group">
        <label for="asal">Kota Asal</label>
        <input id="asal" type="text" placeholder="Contoh: Jakarta, Bandung, Surabaya">
        <div id="infoAsal" class="info-box"></div>
    </div>

    <div class="form-group">
        <label for="tujuan">Kota Tujuan</label>
        <input id="tujuan" type="text" placeholder="Contoh: Bandung, Yogyakarta, Bali">
        <div id="infoTujuan" class="info-box"></div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="kelas">Pilih Kelas</label>
            <select id="kelas">
                <option value="">-- Pilih Kelas --</option>
                <option value="Ekonomi">💺 Ekonomi</option>
                <option value="Eksekutif">👑 Eksekutif</option>
            </select>
        </div>

        <div class="form-group">
            <label for="tanggal">Tanggal Berangkat</label>
            <input type="date" id="tanggal">
        </div>
    </div>

    <button class="btn-cari" onclick="cari()">🔍 Cari Tiket</button>
</div>

<div id="hasil"></div>

<script>
let transport = "";

// DATA TRANSIT
let transit = {
    Pesawat: {
        jakarta: "Bandara Soekarno-Hatta (CGK)",
        surabaya: "Bandara Juanda (SUB)",
        bali: "Bandara Ngurah Rai (DPS)",
        bandung: "Bandara Husein Sastranegara (BDO)",
        yogyakarta: "Bandara Adi Sumarmo (JOG)"
    },
    Kereta: {
        jakarta: "Stasiun Gambir",
        bandung: "Stasiun Bandung",
        surabaya: "Stasiun Gubeng",
        yogyakarta: "Stasiun Tugu",
        solo: "Stasiun Solo Balapan"
    },
    Bus: {
        jakarta: "Terminal Pulo Gebang",
        bandung: "Terminal Leuwi Panjang",
        surabaya: "Terminal Bungurasih",
        yogyakarta: "Terminal Giwangan",
        solo: "Terminal Tirtonadi"
    },
    Kapal: {
        jakarta: "Pelabuhan Tanjung Priok",
        surabaya: "Pelabuhan Tanjung Perak",
        makassar: "Pelabuhan Soekarno-Hatta",
        bali: "Pelabuhan Benoa"
    }
};

// HARGA
let hargaBase = {
    Pesawat: 500000,
    Kereta: 150000,
    Bus: 100000,
    Kapal: 200000
};

// ICON TRANSPORT
let iconTransport = {
    Pesawat: "✈️",
    Kereta: "🚆",
    Bus: "🚌",
    Kapal: "⛴️"
};

// PILIH TRANSPORT
function pilihTransport(el, jenis) {
    transport = jenis;
    document.getElementById("jenis").innerText = `Transport: ${jenis}`;

    document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
}

// DETECT TRANSIT
function cariTransit(kota) {
    kota = kota.toLowerCase();

    if (!transit[transport]) return "";

    let data = transit[transport];

    for (let key in data) {
        if (kota.includes(key)) {
            return data[key];
        }
    }

    return "";
}

// AUTO DETECT
document.getElementById("asal").addEventListener("input", function() {
    let transit = cariTransit(this.value);
    let infoEl = document.getElementById("infoAsal");
    if (transit) {
        infoEl.textContent = "📍 " + transit;
        infoEl.classList.add("success");
        infoEl.classList.remove("error");
    } else {
        infoEl.textContent = this.value ? "❌ Tidak ditemukan" : "";
        infoEl.classList.remove("success");
        if (this.value) infoEl.classList.add("error");
    }
});

document.getElementById("tujuan").addEventListener("input", function() {
    let transit = cariTransit(this.value);
    let infoEl = document.getElementById("infoTujuan");
    if (transit) {
        infoEl.textContent = "📍 " + transit;
        infoEl.classList.add("success");
        infoEl.classList.remove("error");
    } else {
        infoEl.textContent = this.value ? "❌ Tidak ditemukan" : "";
        infoEl.classList.remove("success");
        if (this.value) infoEl.classList.add("error");
    }
});

// CARI
function cari() {
    if (transport == "") {
        alert("⚠️ Pilih transportasi terlebih dahulu!");
        return;
    }

    let asal = document.getElementById("asal").value.trim();
    let tujuan = document.getElementById("tujuan").value.trim();
    let tgl = document.getElementById("tanggal").value;
    let kelas = document.getElementById("kelas").value;

    let trA = document.getElementById("infoAsal").textContent.replace("📍 ", "");
    let trT = document.getElementById("infoTujuan").textContent.replace("📍 ", "");

    if (!asal || !tujuan || !tgl) {
        alert("⚠️ Lengkapi semua data pencarian!");
        return;
    }

    if (kelas == "") {
        alert("⚠️ Pilih kelas perjalanan!");
        return;
    }

    if (!trA || !trT) {
        alert("⚠️ Kota asal atau tujuan tidak ditemukan. Periksa kembali!");
        return;
    }

    let list = `<div class="hasil-title">✈️ Hasil Pencarian Tiket ${transport}</div>`;

    for (let i = 1; i <= 3; i++) {
        let harga = hargaBase[transport] + (i * 50000);

        if (kelas == "Ekonomi") harga += 100000;
        if (kelas == "Eksekutif") harga += 200000;

        let jam = ["08:00", "12:00", "18:00"][i - 1];
        let durasi = ["2 jam", "3 jam", "2.5 jam"];

        list += `
        <div class="card">
            <div class="card-left">
                <div class="card-title">
                    <div class="card-icon">${iconTransport[transport]}</div>
                    <div>${asal} → ${tujuan}</div>
                </div>
                <div class="card-info">⏰ ${tgl} | ${jam}</div>
                <div class="card-info">🛫 Terminal: ${trA}</div>
                <div class="card-info">🛬 Terminal: ${trT}</div>
                <div class="card-info">⏱️ Durasi: ${durasi[i-1]} | 🪑 ${kelas}</div>
            </div>

            <div class="card-right">
                <div class="card-price">Rp ${harga.toLocaleString('id-ID')}</div>
                <button class="btn-pesan" onclick="pesan('${asal}','${tujuan}','${tgl}','${transport}','${jam}','${kelas}',${harga})">
                    🎫 Pesan Sekarang
                </button>
            </div>
        </div>
        `;
    }

    document.getElementById("hasil").innerHTML = list;
}

// SIMPAN & REDIRECT
function pesan(a, t, tgl, trans, jam, kelas, harga) {
    localStorage.setItem("tempTiket", JSON.stringify({
        asal: a,
        tujuan: t,
        tanggal: tgl,
        transport: trans,
        jam: jam,
        kelas: kelas,
        harga: harga
    }));

    window.location = "pesan.html";
}
</script>

</body>
</html>

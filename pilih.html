<!DOCTYPE html>
<html>
<head>
<title>Pilih Transportasi - GO-TRANS</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #eef2f7;
    text-align: center;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(90deg,#1e90ff,#00c6ff);
    color: white;
    padding: 15px;
    font-size: 22px;
}

/* CONTAINER */
.container {
    margin-top: 40px;
}

/* CARD */
.card {
    display: inline-block;
    background: white;
    margin: 15px;
    padding: 20px;
    width: 150px;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}

/* ICON */
.icon {
    font-size: 50px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="navbar">GO-TRANS</div>

<div class="container">
<h2>Pilih Transportasi</h2>

<div class="card" onclick="pilih('Pesawat')">
    <div class="icon">✈️</div>
    <p>Pesawat</p>
</div>

<div class="card" onclick="pilih('Kereta')">
    <div class="icon">🚆</div>
    <p>Kereta</p>
</div>

<div class="card" onclick="pilih('Bus')">
    <div class="icon">🚌</div>
    <p>Bus</p>
</div>

<div class="card" onclick="pilih('Kapal')">
    <div class="icon">🚢</div>
    <p>Kapal</p>
</div>

<div class="card">
    
    <!-- LOGO -->
    <img src="img/logo.png" class="logo">

    <h1>GO-TRANS</h1>
    <p>Reservasi Transportasi Online</p>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p><a href="register.html">Belum punya akun? Register</a></p>
</div>

</div>

<script>
function pilih(jenis){
    localStorage.setItem("transport", jenis);
    window.location = "dashboard.html";
}
</script>

</body>
</html>

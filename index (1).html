<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: 'Segoe UI';
    background: #eef2f7;
    text-align: center;
}

.navbar {
    background: linear-gradient(90deg,#1e90ff,#00c6ff);
    color: white;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
}

.card {
    background: white;
    margin: 40px auto;
    padding: 25px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: left;
}

.struk-container {
    background: white;
    border: 2px solid #1e90ff;
    border-radius: 10px;
    padding: 20px;
    font-family: 'Courier New', monospace;
    max-width: 400px;
    margin: 20px auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.struk-header {
    text-align: center;
    border-bottom: 2px dashed #1e90ff;
    padding-bottom: 15px;
    margin-bottom: 15px;
}

.struk-header h1 {
    margin: 5px 0;
    font-size: 24px;
    color: #1e90ff;
}

.struk-header p {
    margin: 3px 0;
    font-size: 11px;
    color: #666;
}

.struk-kode {
    text-align: center;
    background: #e3f2fd;
    border-left: 4px solid #1e90ff;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
}

.struk-kode .label {
    font-size: 10px;
    color: #1e90ff;
    text-transform: uppercase;
    font-weight: bold;
}

.struk-kode .kode {
    font-size: 20px;
    font-weight: bold;
    color: #1e90ff;
    letter-spacing: 2px;
    margin-top: 5px;
}

.struk-section {
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 1px dashed #ccc;
}

.struk-section:last-child {
    border-bottom: none;
}

.struk-title {
    font-size: 11px;
    font-weight: bold;
    color: #1e90ff;
    text-transform: uppercase;
    margin-bottom: 10px;
    border-left: 3px solid #1e90ff;
    padding-left: 8px;
}

.struk-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
}

.struk-row .label {
    color: #666;
    font-weight: bold;
}

.struk-row .value {
    color: #333;
    font-weight: bold;
    text-align: right;
}

.struk-rute {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f0f8ff;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
}

.struk-rute .lokasi {
    text-align: center;
    flex: 1;
}

.struk-rute .lokasi .kota {
    font-size: 14px;
    font-weight: bold;
    color: #1e90ff;
}

.struk-rute .lokasi .label {
    font-size: 9px;
    color: #666;
}

.struk-rute .panah {
    font-size: 16px;
    color: #1e90ff;
    margin: 0 10px;
}

.struk-detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}

.struk-detail-item {
    background: #f9f9f9;
    padding: 8px;
    border-radius: 5px;
    border-left: 2px solid #00c6ff;
}

.struk-detail-item .label {
    font-size: 9px;
    color: #666;
    text-transform: uppercase;
}

.struk-detail-item .value {
    font-size: 12px;
    font-weight: bold;
    color: #333;
    margin-top: 3px;
}

.struk-harga {
    background: #e8f5e9;
    padding: 12px;
    border-radius: 5px;
    border-left: 3px solid #4caf50;
}

.struk-harga-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
}

.struk-harga-row .label {
    color: #666;
}

.struk-harga-row .value {
    color: #333;
    font-weight: bold;
}

.struk-harga-total {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    font-weight: bold;
    color: #1e90ff;
    border-top: 1px solid #ccc;
    padding-top: 8px;
    margin-top: 8px;
}

.struk-status {
    text-align: center;
    background: #e8f5e9;
    padding: 10px;
    border-radius: 5px;
    font-weight: bold;
    color: #4caf50;
    font-size: 12px;
    text-transform: uppercase;
}

.struk-footer {
    text-align: center;
    font-size: 10px;
    color: #999;
    border-top: 2px dashed #1e90ff;
    padding-top: 10px;
    margin-top: 10px;
}

.struk-info {
    background: #fff3e0;
    border-left: 3px solid #ff9800;
    padding: 8px;
    border-radius: 5px;
    font-size: 9px;
    color: #333;
    line-height: 1.4;
    margin-bottom: 10px;
}

.etiket {
    text-align: center;
    border-bottom: 2px dashed #ccc;
    margin-bottom: 15px;
    padding-bottom: 10px;
}

.etiket h2 {
    margin: 5px 0;
}

.detail p {
    margin: 5px 0;
}

.status {
    padding: 6px 12px;
    border-radius: 10px;
    color: white;
    font-size: 12px;
}

.booked { background: green; }
.reschedule { background: orange; }
.refund { background: red; }

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    width: 100%;
}

.res { background: orange; color:white; }
.ref { background: red; color:white; }
.download { background: #1e90ff; color:white; }

.kode {
    font-weight: bold;
    color: #1e90ff;
}

.tiket-pdf {
    display: none;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #1e90ff;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

.btn-pesan {
    background: green;
    color: white;
}
</style>
</head>

// SIMPAN PESANAN
function simpanPesanan(event){
    event.preventDefault();
    
    let tiket = {
        nama: document.getElementById("nama").value,
        nik: document.getElementById("nik").value,
        asal: document.getElementById("asal").value,
        tujuan: document.getElementById("tujuan").value,
        tanggal: document.getElementById("tanggal").value,
        transport: document.getElementById("transport").value,
        kelas: document.getElementById("kelas").value,
        jam: document.getElementById("jam").value,
        harga: parseInt(document.getElementById("harga").value),
        status: "Booked"
    };

    localStorage.setItem("tiket", JSON.stringify(tiket));
    location.reload();
}

// RESCHEDULE
function res(){
    let t = JSON.parse(localStorage.getItem("tiket"));
    let tgl = prompt("Tanggal baru:");

    if(tgl){
        t.tanggal = tgl;
        t.status = "Reschedule";
        localStorage.setItem("tiket", JSON.stringify(t));
        location.reload();
    }
}

// REFUND
function ref(){
    let t = JSON.parse(localStorage.getItem("tiket"));

    if(confirm("Yakin refund?")){
        t.status = "Refund";
        localStorage.setItem("tiket", JSON.stringify(t));
        location.reload();
    }
}

// DOWNLOAD TIKET PDF
function downloadTiketPDF(){
    let t = JSON.parse(localStorage.getItem("tiket"));

    if(!t){
        alert("Tidak ada tiket!");
        return;
    }

    let element = document.getElementById("tiketPDF");

    let opt = {
        margin: 0,
        filename: "e-tiket-" + kodeGlobal + ".pdf",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: "portrait", unit: "mm", format: "a4" }
    };

    html2pdf().set(opt).from(element).save();
}
</script>
